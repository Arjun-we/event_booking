{% extends 'base.html' %}
{% block title %}{{ role|title }} Login – Event Planner{% endblock %}
{% block content %}

<form method="POST">
    <h2>{{ role|title }} Login</h2>
    <p class="form-sub">Sign in to your account</p>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" style="width:100%;margin-top:5px;">Login</button>

    <p class="form-footer">
        Don't have an account?
        <a href="{{ url_for('signup', role=role) }}">Sign Up</a>
        &nbsp;|&nbsp;
        <a href="{{ url_for('role_select') }}">← Back</a>
    </p>
</form>

{% endblock %}
