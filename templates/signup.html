{% extends 'base.html' %}
{% block title %}{{ role|title }} Sign Up – Event Planner{% endblock %}
{% block content %}

<form method="POST">
    <h2>{{ role|title }} Registration</h2>
    <p class="form-sub">Create your account</p>

    <div class="form-group">
        <label>{{ 'Business Name' if role == 'vendor' else 'Full Name' }}</label>
        <input type="text" name="name" required placeholder="{{ 'Your Business Name' if role == 'vendor' else 'Jane Doe' }}">
    </div>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Create a password" minlength="6">
    </div>
    <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Repeat your password">
    </div>
    <button type="submit" style="width:100%;margin-top:5px;">Create {{ role|title }} Account</button>

    <p class="form-footer">
        Already have an account?
        <a href="{{ url_for('login', role=role) }}">Login</a>
        &nbsp;|&nbsp;
        <a href="{{ url_for('role_select') }}">← Back</a>
    </p>
</form>

{% endblock %}
